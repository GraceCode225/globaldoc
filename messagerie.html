<div class="page-wrapper">
  <div style="background:linear-gradient(135deg,#1B2A4A,#243660);padding:40px 2rem;text-align:center;">
    <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:white;margin-bottom:8px;">💬 Mes <span style="color:var(--gold);">Messages</span></h1>
    <p style="color:rgba(255,255,255,0.7);">Historique de vos commandes et échanges avec GlobalDoc.</p>
  </div>

  <div class="section" style="max-width:900px;" id="mainContent">
    <div id="notLoggedSection" style="text-align:center;padding:60px 20px;">
      <div style="font-size:52px;margin-bottom:16px;">🔒</div>
      <h3 style="color:var(--navy);margin-bottom:12px;">Connectez-vous pour voir vos messages</h3>
      <a href="compte.html" class="btn btn-primary btn-lg">👤 Se connecter</a>
    </div>

    <div id="messagesSection" style="display:none;">
      <h3 style="font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:20px;">Vos commandes</h3>
      <div id="myCommandes"></div>
    </div>
  </div>
</div>

<a href="javascript:void(0)" onclick="redirectWhatsApp()" class="whatsapp-float">💬</a>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script><script src="js/sounds.js"></script><script src="js/app.js"></script>
<script>
const user = getSession();
if (!user) {
  document.getElementById('notLoggedSection').style.display = 'block';
} else {
  document.getElementById('notLoggedSection').style.display = 'none';
  document.getElementById('messagesSection').style.display = 'block';
  loadMyCommandes();
}

async function loadMyCommandes() {
  const container = document.getElementById('myCommandes');
  const { data: items } = await db.from('commandes').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  if (!items || !items.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#8A95A8;"><div style="font-size:48px;margin-bottom:12px;">📭</div>Aucune commande pour le moment.<br><a href="commander.html" class="btn btn-primary" style="margin-top:16px;">📦 Passer une commande</a></div>';
    return;
  }
  container.innerHTML = items.map(cmd => `
    <div class="card" style="margin-bottom:16px;border-left:4px solid ${cmd.status === 'traite' ? 'var(--success)' : 'var(--gold)'};">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
        <div>
          <span class="badge badge-navy" style="margin-right:8px;">${cmd.id}</span>
          <strong style="color:var(--navy);">${cmd.type_label}</strong>
        </div>
        <span class="badge ${cmd.status === 'traite' ? 'badge-green' : 'badge-gold'}">${cmd.status === 'traite' ? '✅ Traité' : '⏳ En attente'}</span>
      </div>
      <p style="font-size:13px;color:#555;margin-bottom:10px;">${cmd.description}</p>
      <p style="font-size:11px;color:#8A95A8;margin-bottom:12px;">📅 ${formatTime(cmd.created_at)}</p>
      <button onclick="openChat('${cmd.id}')" class="btn btn-primary btn-sm">💬 Voir la discussion</button>
    </div>
  `).join('');
}

function openChat(orderId) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:600px;width:95%;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 class="modal-title">💬 Discussion — ${orderId}</h3>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;">✕</button>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chatMsgs${orderId}"></div>
        <div class="chat-input-area">
          <input type="text" id="chatIn${orderId}" class="chat-input" placeholder="Votre message..." onkeypress="if(event.key==='Enter') sendMsg('${orderId}')">
          <button onclick="sendMsg('${orderId}')" class="btn btn-primary" style="border-radius:24px;padding:10px 18px;">Envoyer</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const chatMsgs = document.getElementById('chatMsgs' + orderId);
  db.from('messages').select('*').eq('commande_id', orderId).order('created_at').then(({ data }) => {
    if (data) data.forEach(msg => {
      const isMe = msg.sender === user.id;
      const div = document.createElement('div');
      div.className = `message ${isMe ? 'sent' : 'received'}`;
      div.innerHTML = `<div>${(msg.text||'').replace(/\n/g,'<br>')}</div><div class="message-time">${isMe ? 'Vous' : msg.sender_name} — ${formatTimeShort(msg.created_at)}</div>`;
      chatMsgs.appendChild(div);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    });
  });
  db.channel('chat_' + orderId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `commande_id=eq.${orderId}` }, payload => {
      const msg = payload.new;
      const isMe = msg.sender === user.id;
      const div = document.createElement('div');
      div.className = `message ${isMe ? 'sent' : 'received'}`;
      div.innerHTML = `<div>${(msg.text||'').replace(/\n/g,'<br>')}</div><div class="message-time">${isMe ? 'Vous' : msg.sender_name} — ${formatTimeShort(msg.created_at)}</div>`;
      chatMsgs.appendChild(div);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
      if (!isMe) Sounds.message();
    }).subscribe();
}

async function sendMsg(orderId) {
  const input = document.getElementById('chatIn' + orderId);
  const text = input.value.trim();
  if (!text || !user) return;
  await db.from('messages').insert({ commande_id: orderId, text, sender: user.id, sender_name: user.name });
  input.value = '';
}
</script>
<script>
function toggleMenu() {
  var nav = document.querySelector('.navbar-nav');
  var btn = document.getElementById('hamburgerBtn');
  if (!nav || !btn) return;
  nav.classList.toggle('open');
  btn.classList.toggle('open');
}
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.navbar-nav a').forEach(function(a) {
    a.addEventListener('click', function() {
      var nav = document.querySelector('.navbar-nav');
      var btn = document.getElementById('hamburgerBtn');
      if (nav) nav.classList.remove('open');
      if (btn) btn.classList.remove('open');
    });
  });
});
</script>

<script>
// ── BARRE PROGRESSION SCROLL ──
window.addEventListener('scroll', () => {
  const scrolled = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
  const bar = document.getElementById('scroll-progress');
  if (bar) bar.style.width = scrolled + '%';
});

// ── SCROLL REVEAL ──
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 100);
      revealObs.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

// ── CURSEUR PC ──
if (window.innerWidth > 768) {
  const cursor = document.getElementById('custom-cursor');
  const trail = document.getElementById('cursor-trail');
  if (cursor && trail) {
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX - 10 + 'px';
      cursor.style.top = e.clientY - 10 + 'px';
      setTimeout(() => {
        trail.style.left = e.clientX - 20 + 'px';
        trail.style.top = e.clientY - 20 + 'px';
      }, 80);
    });
  }
}
</script>

<script>
// ── PWA SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/globaldoc/sw.js')
      .then(reg => console.log('SW enregistré'))
      .catch(err => console.log('SW erreur:', err));
  });
}

// ── BANNIÈRE INSTALLATION ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  // Ne pas afficher si déjà installé
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#1B2A4A,#243660);
      color:white; padding:14px 20px; border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      display:flex; align-items:center; gap:12px;
      z-index:9999; max-width:320px; width:90%;
      border:1px solid rgba(201,168,76,0.4);
      animation: slideUp 0.5s ease;
    ">
      <span style="font-size:32px;">📱</span>
      <div style="flex:1;">
        <div style="font-weight:700; font-size:14px; margin-bottom:2px;">Installer GlobalDoc</div>
        <div style="font-size:12px; opacity:0.8;">Accès rapide depuis votre écran</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button onclick="installApp()" style="
          background:#C9A84C; color:#1B2A4A; border:none;
          padding:8px 14px; border-radius:8px; font-weight:700;
          font-size:13px; cursor:pointer; white-space:nowrap;
        ">Installer</button>
        <button onclick="document.getElementById('install-banner').remove()" style="
          background:rgba(255,255,255,0.1); color:white; border:none;
          padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer;
        ">Plus tard</button>
      </div>
    </div>
    <style>
      @keyframes slideUp {
        from { opacity:0; transform:translateX(-50%) translateY(20px); }
        to { opacity:1; transform:translateX(-50%) translateY(0); }
      }
    </style>
  `;
  document.body.appendChild(banner);
  
  // Disparaît après 15 secondes
  setTimeout(() => {
    const b = document.getElementById('install-banner');
    if (b) b.remove();
  }, 15000);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
  if (result.outcome === 'accepted') {
    showToast && showToast('Application installée ! Cherchez GlobalDoc sur votre écran.', 'success');
  }
}
</script>
