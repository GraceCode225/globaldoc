<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliothèque PDF — GlobalDoc DGD.CI</title>
  <meta name="theme-color" content="#1B2A4A">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "ee9d25cd-63b4-4cb7-bd77-05bba2ba9c32",
        notifyButton: { enable: false },
        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: true,
              text: {
                actionMessage: "Recevez les nouveaux documents et promotions GlobalDoc !",
                acceptButton: "Oui, autoriser",
                cancelButton: "Plus tard"
              },
              delay: { pageViews: 1, timeDelay: 4 }
            }]
          }
        }
      });
    });
  </script>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- HEADER -->
<header class="top-header">
  <a href="index.html" style="color:rgba(255,255,255,0.7);font-size:22px;text-decoration:none;">←</a>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher un PDF..." oninput="filterPdfs(this.value)">
    <button>🔍</button>
  </div>
</header>

<!-- FILTRES -->
<div style="display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:white;scrollbar-width:none;border-bottom:1px solid var(--border);">
  <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('cv',this)">📄 CV</button>
  <button class="filter-btn" onclick="setFilter('lettre',this)">✉️ Lettres</button>
  <button class="filter-btn" onclick="setFilter('expose',this)">📋 Exposés</button>
  <button class="filter-btn" onclick="setFilter('memoire',this)">🎓 Mémoires</button>
  <button class="filter-btn" onclick="setFilter('rapport',this)">📊 Rapports</button>
</div>
<style>
.filter-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: white;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
  color: var(--text2);
  transition: all 0.2s;
}
.filter-btn.active {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}
</style>

<!-- CATALOGUE -->
<div style="padding:12px;">
  <div id="catalogueGrid" class="catalogue-grid">
    <div class="loader" style="grid-column:1/-1;">
      <div class="spinner"></div>
      Chargement...
    </div>
  </div>
</div>

<!-- MODAL ACHAT -->
<div id="modalAchat" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitre">Acheter ce document</div>
    <div class="wave-box">
      <div class="wave-logo">🌊</div>
      <div class="wave-label">Paiement Wave</div>
      <div class="wave-number">+225 0501233818</div>
    </div>
    <div class="wave-steps">
      <div class="wave-step"><span class="n">1</span>Ouvrez Wave sur votre téléphone</div>
      <div class="wave-step"><span class="n">2</span>Envoyez <strong id="modalMontant" style="color:var(--gold);margin:0 4px;">-</strong> au <strong>+225 0501233818</strong></div>
      <div class="wave-step"><span class="n">3</span>Notez "GlobalDoc" + votre email en référence</div>
      <div class="wave-step"><span class="n">4</span>Prenez une capture et uploadez-la ci-dessous</div>
    </div>
    <div style="margin-top:16px;">
      <label class="form-label">Votre email pour recevoir le PDF</label>
      <input type="email" id="buyerEmail" class="form-control" placeholder="votre@email.com">
    </div>
    <div style="margin-top:12px;">
      <label class="form-label">Capture d'écran du paiement Wave</label>
      <input type="file" id="captureFile" accept="image/*" class="form-control">
    </div>
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="confirmerAchat()">✅ Confirmer</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html"><span class="icon">🏠</span><span>Accueil</span></a>
  <a href="services.html"><span class="icon">📋</span><span>Services</span></a>
  <a href="commander.html"><span class="icon">🛒</span><span>Commander</span></a>
  <a href="bibliotheque.html" class="active"><span class="icon">📚</span><span>Bibliothèque</span></a>
  <a href="compte.html"><span class="icon">👤</span><span>Compte</span></a>
</nav>

<script>
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}

let allItems = [];
let currentFilter = 'all';
let pdfEnCours = null;

async function loadPdfs() {
  const grid = document.getElementById('catalogueGrid');
  try {
    const { data: items, error } = await db.from('bibliotheque').select('*').order('created_at', { ascending: false });
    if (error) { grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">⚠️</div><div class="title">Erreur de chargement</div><div class="sub">${error.message}</div></div>`; return; }
    allItems = items || [];
    renderPdfs(allItems);
  } catch(e) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">⚠️</div><div class="title">Erreur</div><div class="sub">${e.message}</div></div>`;
  }
}

function renderPdfs(items) {
  const grid = document.getElementById('catalogueGrid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📭</div><div class="title">Aucun document disponible</div><div class="sub">La bibliothèque sera bientôt enrichie !</div></div>`;
    return;
  }
  grid.innerHTML = items.map(p => `
    <div class="pdf-card">
      <div class="pdf-cover">${p.image_url ? `<img src="${p.image_url}" alt="${p.titre}" onerror="this.style.display='none'">` : '📄'}</div>
      <div class="pdf-body">
        <div class="pdf-title">${p.titre}</div>
        <div class="pdf-desc">${p.description || ''}</div>
        <div class="pdf-prix">${(p.prix||1000).toLocaleString()} FCFA</div>
        <button class="btn-acheter" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">🛒 Acheter</button>
      </div>
    </div>
  `).join('');
}

function filterPdfs(q) {
  const filtered = allItems.filter(p => 
    p.titre?.toLowerCase().includes(q.toLowerCase()) ||
    p.description?.toLowerCase().includes(q.toLowerCase())
  );
  renderPdfs(filtered);
}

function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;
  if (type === 'all') renderPdfs(allItems);
  else renderPdfs(allItems.filter(p => p.titre?.toLowerCase().includes(type) || p.description?.toLowerCase().includes(type)));
}

function openModal(pdf) {
  pdfEnCours = pdf;
  document.getElementById('modalTitre').textContent = '🛒 ' + pdf.titre;
  document.getElementById('modalMontant').textContent = (pdf.prix||1000).toLocaleString() + ' FCFA';
  document.getElementById('modalAchat').classList.add('show');
}
function closeModal() {
  document.getElementById('modalAchat').classList.remove('show');
  pdfEnCours = null;
}
document.getElementById('modalAchat').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

async function confirmerAchat() {
  if (!pdfEnCours) return;
  const email = document.getElementById('buyerEmail').value.trim();
  const captureFile = document.getElementById('captureFile').files[0];
  if (!email) { showToast('Veuillez entrer votre email', 'error'); return; }

  let captureUrl = null;
  if (captureFile) {
    const capName = 'capture_' + Date.now() + '_' + captureFile.name.replace(/\s/g,'_');
    const { data: capData } = await db.storage.from('bibliotheque').upload(capName, captureFile);
    if (capData) {
      const { data: urlData } = db.storage.from('bibliotheque').getPublicUrl(capName);
      captureUrl = urlData.publicUrl;
    }
  }

  const { error } = await db.from('achats_pdf').insert({
    pdf_id: pdfEnCours.id,
    pdf_titre: pdfEnCours.titre,
    user_id: email,
    user_name: email,
    montant: pdfEnCours.prix || 1000,
    capture_url: captureUrl,
    statut: 'en_attente'
  });

  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  closeModal();
  showToast('✅ Commande envoyée ! Vous recevrez le PDF après vérification du paiement.', 'success');
}

// URL params
const params = new URLSearchParams(window.location.search);
if (params.get('q')) document.getElementById('searchInput').value = params.get('q');

loadPdfs();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/globaldoc/sw.js');
</script>
</body>
</html>
